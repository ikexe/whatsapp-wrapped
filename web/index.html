<!DOCTYPE html>
<html>
<head>
    <title>WhatsWrapped</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <div class="slide active">
            <h1>WhatsWrapped</h1>
            <p>Explore the Stats.</p>
        </div>

        <div class="slide">
            <h2>Top Senders</h2>
            <div id="bar-chart"></div>
        </div>

        <div class="slide">
            <h2>Total Words</h2>
            <p id="total-words"></p>
        </div>

        <div class="slide">
            <h2>Night Owl</h2>
            <p id="night-owl"></p>
        </div>

        <div class="slide">
            <h2>Ghost</h2>
            <p id="ghost"></p>
        </div>

        <div class="slide">
            <h2>Busiest Day</h2>
            <p id="busiest-day"></p>
        </div>

        <div class="slide">
            <h2>Longest Silence</h2>
            <p id="longest-silence"></p>
        </div>

        <div class="slide">
            <h2>Emoji Stats</h2>
            <div id="emoji-stats"></div>
        </div>

        <div class="slide">
            <h2>Hype Person</h2>
            <p id="hype-person"></p>
        </div>

        <div class="slide">
            <h2>Selective Responder</h2>
            <p id="selective-responder"></p>
        </div>

        <div class="slide">
            <h2>User Profiles</h2>
            <div id="profile-buttons"></div>
            <div id="user-profile">
                <h3 id="user-name"></h3>
                <p id="user-messages"></p>
                <p id="user-words"></p>
                <p id="user-emojis"></p>
                <p id="user-response-time"></p>
                <div id="user-activity"></div>
            </div>
        </div>

        <div class="slide">
            <h1>That’s Your WhatsWrapped</h1>
            <p>Comeback Next Year!</p>
        </div>

    </div>
    
    <button id="NextButton">Next</button>

    <script src="app.js" defer></script>
</body>
</html>
