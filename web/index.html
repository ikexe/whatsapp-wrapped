<!DOCTYPE html>
<html>
<head>
    <title>WhatsWrapped</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="style.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <!-- 1. Intro -->
        <div class="slide active">
            <h1>WhatsWrapped</h1>
            <p>Explore the Stats.</p>
        </div>

        <!-- 2. Total Messages -->
        <div class="slide">
            <h2>Total Messages</h2>
            <p id="total-messages"></p>
        </div>

        <!-- 3. Total Words -->
        <div class="slide">
            <h2>Total Words</h2>
            <p id="total-words"></p>
        </div>

        <!-- 4. Night Owl -->
        <div class="slide">
            <h2>Night Owl</h2>
            <p id="night-owl"></p>
        </div>

        <!-- 5. Ghost -->
        <div class="slide">
            <h2>Ghost</h2>
            <p id="ghost"></p>
        </div>

        <!-- 6. Busiest Day -->
        <div class="slide">
            <h2>Busiest Day</h2>
            <p id="busiest-day"></p>
        </div>

        <!-- 7. Longest Silence -->
        <div class="slide">
            <h2>Longest Silence</h2>
            <p id="longest-silence"></p>
        </div>

        <!-- 8. Emoji Stats -->
        <div class="slide">
            <h2>Emoji Stats</h2>
            <p id="emoji-stats"></p>
        </div>

        <!-- 9. Hype Person -->
        <div class="slide">
            <h2>Hype Person</h2>
            <p id="hype-person"></p>
        </div>

        <!-- 10. Selective Responder -->
        <div class="slide">
            <h2>Selective Responder</h2>
            <p id="selective-responder"></p>
        </div>

        <!-- 11. User Profiles -->
        <div class="slide">
            <h2>User Profiles</h2>
            <div id="user-profile">
                <p id="user-name"></p>
                <p id="user-messages"></p>
                <p id="user-words"></p>
                <p id="user-emojis"></p>
                <p id="user-response-time"></p>
            </div>
        </div>

        <!-- 12. Ending -->
        <div class="slide">
            <h1>That’s Your WhatsWrapped</h1>
            <p>Comeback Next Year!</p>
        </div>

    </div>

    <button id="NextButton">Next</button>

    <script src="app.js"></script>
</body>
</html>
