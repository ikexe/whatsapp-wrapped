<!DOCTYPE html>
<html lang="en">
<head>
    <title>WhatsApp Wrapped</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="slide active">
            <h1>WhatsApp Wrapped "Whatify"</h1>
            <p>Re-live your group chat moments and enjoy them.</p>
        </div>
        <div class="slide">
            <h2>Total Messages</h2>
            <p id="total-messages">Loading...</p>
        </div>
        <div class="slide">
            <h2>Busiest Day</h2>
            <p id="busiest-day">Loading...</p>
        </div>
    </div>
    <button id="nextBtn">Next</button>
    <script src="app.js"></script>
</body>
</html>
